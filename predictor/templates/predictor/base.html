<!DOCTYPE html>
<html lang="en" data-theme="dark">
{% load static %}
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MindScan{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'predictor/css/style.css' %}">
</head>
<body>

<nav>
  <a href="/" class="brand"><i class="fa-solid fa-brain"></i> MindScan</a>
  <div class="nav-right">
    <a href="/" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
    <a href="/about/" class="nav-link"><i class="fa-solid fa-circle-info"></i> About</a>
    <button id="themeBtn" title="Toggle theme"><i class="fa-solid fa-moon" id="themeIcon"></i></button>
  </div>
</nav>

<main>{% block content %}{% endblock %}</main>

<footer>
  <i class="fa-solid fa-heart-pulse"></i>
  MindScan is an AI screening tool — not a medical diagnosis. Consult a professional for proper support.
</footer>

<script src="{% static 'predictor/js/main.js' %}"></script>
</body>
</html>
